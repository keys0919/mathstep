name: Deploy to GitHub Pages

on:
  push:
    branches: [source]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx expo export -p web

      - name: Inject SW version
        run: sed -i "s/__BUILD_VERSION__/${{ github.run_id }}/g" dist/sw.js

      - name: Copy icons
        run: mkdir -p dist/icons && cp -r public/icons/. dist/icons/

      - name: Add iOS PWA meta tags
        run: |
          find dist -name "*.html" -exec sed -i 's|</head>|<link rel="apple-touch-icon" href="/mathstep/icons/icon-512.png"><meta name="apple-mobile-web-app-title" content="째이 수학"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"></head>|' {} \;

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
